version: "3.9"

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always

  redis-commander:
    image: rediscommander/redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: always
