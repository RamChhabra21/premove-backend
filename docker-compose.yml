version: "3.9"

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always

  redis-commander:
    image: rediscommander/redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: always

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: always

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=INFO --concurrency=1 -Q automation
    depends_on:
      - redis
    restart: always
